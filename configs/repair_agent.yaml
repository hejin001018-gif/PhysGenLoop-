# Learning Repair Agent 的云端训练默认配置。
# 当前策略只读取结构化 CriticReport，因此显存需求远低于视频 Critic 训练。

training:
  seed: 42
  epochs: 80
  batch_size: 64
  learning_rate: 0.0003
  weight_decay: 0.0001
  hidden_dims: [128, 64]
  dropout: 0.15
  gain_loss_weight: 0.2
  patience: 12
  minimum_delta: 0.0001
  validation_fraction: 0.1
  test_fraction: 0.1
  device: auto
  num_workers: 0
  # 失败尝试应进入 Memory 作为负经验，但默认不作为正确动作监督。
  successful_only: true
  # 单模型训练时可直接评估；多种子 campaign 会覆盖为 false，最终仅测试优胜模型。
  evaluate_test: true

agent:
  memory_weight: 0.25
  memory_k: 5
  minimum_policy_confidence: 0.4
  minimum_memory_similarity: 0.2
