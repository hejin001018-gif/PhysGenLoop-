# PAVG Critic 2.0 的可执行默认配置。
# 重型视觉模型通过构造器/API 适配器注入；这里的默认值可在无密钥、无 GPU 时运行。

detector:
  backend: color_blob
  object_label: red_ball
  hsv_lower: [0, 90, 70]
  hsv_upper: [10, 255, 255]
  hsv_lower_2: [170, 90, 70]
  hsv_upper_2: [179, 255, 255]
  min_area: 80.0
  floor_y_ratio: 0.9

tracker:
  max_match_distance_px: 80.0
  max_missed_frames: 5

trajectory:
  smoothing_window: 3

events:
  velocity_epsilon_px_s: 8.0
  contact_tolerance_px: 3.0
  penetration_tolerance_px: 5.0
  min_disappearance_frames: 3
  min_upward_frames: 2
  teleport_speed_px_s: 1000.0

rules:
  contact_lookback_frames: 2
  gravity_contact_lookback_frames: 3
  enabled:
    - premature_rebound
    - surface_penetration
    - object_disappearance
    - reverse_gravity
    - teleportation

temporal:
  pre_context_frames: 3
  post_context_frames: 3

question_graph:
  enabled: true
  include_generic_physics: true
  rule_pass_confidence: 0.75

checklist:
  enabled: true
  pass_confidence: 0.75

fusion:
  detector_weight: 0.7
  vlm_weight: 0.3
  violation_threshold: 0.5
  physical_score_threshold: 0.6
  clean_confidence: 0.75
